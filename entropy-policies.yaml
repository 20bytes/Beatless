# entropy-policies.yaml — Beatless Context Entropy Governance
# Validated by: scripts/ci/validate_entropy_policies.sh
# Read by: context_entropy_compact.sh, entropy_convergence_gate.sh, rawcli_metrics_rollup.sh

policy_version: 1

modes:
  daily:
    context_budget_tokens_per_turn: 40000
    max_concurrent_explore_tasks: 1
    compaction:
      soft_threshold_chars: 900
      hard_threshold_chars: 2000
      trigger_iteration: 3
      inplace_truncate: true
    convergence:
      min_ratio: 0.6
      cooldown_minutes: 30
      hysteresis_band: 0.1
      max_ideas_in_flight: 3

  intense:
    context_budget_tokens_per_turn: 80000
    max_concurrent_explore_tasks: 2
    compaction:
      soft_threshold_chars: 1500
      hard_threshold_chars: 4000
      trigger_iteration: 5
      inplace_truncate: true
    convergence:
      min_ratio: 0.4
      cooldown_minutes: 60
      hysteresis_band: 0.15
      max_ideas_in_flight: 6

degradation:
  trigger_any:
    - fail_rate_gt: 0.30
    - queue_depth_gt: 12
    - consecutive_failures_gte: 3
    - receipt_pass_rate_lt: 0.95
    - convergence_ratio_lt: 0.2
  restore_all:
    - fail_rate_lt: 0.10
    - queue_depth_lte: 6
    - consecutive_failures_eq: 0
    - receipt_pass_rate_gte: 1.0
    - convergence_ratio_gte: 0.5
  restore_stable_cycles: 6

order_agent:
  role: satonus
  duties:
    - enforce convergence gate before new explore or brainstorm dispatch
    - require decision_ticket_path for completed research tasks
    - block new explore if max_ideas_in_flight exceeded
  escalation: lacia

session_watchdog:
  stale_pane_ttl_minutes: 45
  orphan_result_ttl_minutes: 30
  enabled: true
