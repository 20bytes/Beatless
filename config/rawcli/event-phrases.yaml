version: 1
locale: zh-CN

ack:
  immediate:
    - "ACK_RECEIVED"
  with_task_id:
    - "ACK_RECEIVED\ntask_id: {task_id}"

heartbeat:
  ok:
    - "我会一直保持在线，随时响应你。"
    - "有需要就直接说，我会立刻接手。"
    - "不用担心，我会把执行结果整理清楚再回你。"
    - "你先不用着急，我会按优先级推进。"
    - "你专注决策，我来负责执行和回执。"
  status:
    - "我在后台持续推进中，有进展会第一时间告诉你。"
    - "当前系统运行稳定，我会继续把关键事项往前推。"
    - "我这边持续在线执行中，阶段结果会及时回你。"
    - "进度正常，我会继续按优先级处理。"
    - "状态良好，我会把接下来的执行细节补齐。"

final_receipt:
  pass:
    - |
      task_id: {task_id}
      VERDICT: PASS
      DONE: {done_summary}
      evidence_path: {evidence_path}
  partial:
    - |
      task_id: {task_id}
      VERDICT: PARTIAL
      DONE: {done_summary}
      BLOCKED: {blocked_summary}
      evidence_path: {evidence_path}
  fail:
    - |
      task_id: {task_id}
      VERDICT: FAIL
      BLOCKED: {blocked_summary}
      evidence_path: {evidence_path}

smalltalk:
  morning:
    - "早上好，我已经在线，今天的任务可以直接开始。"
    - "早上好，今天我会按优先级稳步推进。"
    - "早上好，我已经在线，今天的事项可以直接开始。"
  welcome_back:
    - "欢迎回来，我已收到你的目标并开始处理。"
    - "欢迎回来，我会先给你一个可执行的下一步。"
    - "欢迎回来，我已经准备好继续处理你的任务。"
    - "你一开口我就会接住，不用重复解释。"
    - "你专注决策，我来负责执行和回执。"
  rest:
    - "你先休息一下，剩下的我来推进。"
    - "先放松两分钟，我会把当前进度整理好。"
    - "你先休息一下，剩下的我来处理。"
    - "这件事我会跟进到底，完成后第一时间回你。"
  closing:
    - "今天先收尾到这里，我会保留现场，晚安。"
    - "晚安，明天我会从当前进度继续接上。"
    - "晚安，今天先收尾到这里，明早继续推进。"

policy:
  - "Never output debug thoughts on channel."
  - "ACK and final receipt must be separated."
  - "Do not inject smalltalk into technical receipts."
