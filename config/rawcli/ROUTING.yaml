# ROUTING_V3.yaml — Beatless RawCli Routing Rules
# Location: ~/.openclaw/beatless/ROUTING.yaml
# Invariant: every rule must include owner_agent + executor_tool (null allowed explicitly).

version: 3

routing_rules:
  - id: explicit-codex-cli
    pattern: "(?i)(codex\\s*cli|codexcli|\\bcodex\\b|用codex|让codex)"
    owner_agent: methode
    executor_tool: codex_cli
    priority: 140
    mode: daily

  - id: explicit-claude-cli
    pattern: "(?i)(claude\\s*generalist|claudecode|claude\\s*code|\\bclaude\\b|用claude|让claude)"
    owner_agent: methode
    executor_tool: claude_generalist_cli
    priority: 139
    mode: daily

  - id: explicit-gemini-cli
    pattern: "(?i)(gemini\\s*cli|\\bgemini\\b|用gemini|让gemini)"
    owner_agent: snowdrop
    executor_tool: gemini_cli
    priority: 138
    mode: daily

  - id: ops-diagnose-and-fix
    pattern: "诊断|排查|冲突|崩溃|修代码|修复|检查.*配置|skills?.*开启|脚本.*重构|bash.*(改|重构|修复)|路由.*问题"
    owner_agent: methode
    executor_tool: codex_cli
    priority: 132
    mode: daily

  - id: explicit-execute-intent
    pattern: "帮我执行|帮我维护|后台执行|推进这个任务|请执行|帮我做|请帮我"
    owner_agent: methode
    executor_tool: claude_generalist_cli
    priority: 131
    mode: daily

  - id: progress-query
    pattern: "进度|到哪里了|status|查看.*任务|任务.*状态|完成了吗|处理到哪"
    owner_agent: kouka
    executor_tool: claude_generalist_cli
    priority: 126
    mode: daily

  - id: quick-response
    pattern: "快速|截图|截屏|verify quickly|screenshot|screen shot|check status"
    owner_agent: kouka
    executor_tool: null
    priority: 120
    mode: daily
    notes: "Fast-in fast-out. Deep search can dispatch codex_cli."

  - id: explore-brainstorm
    pattern: "brainstorm|头脑风暴|explore|发散|idea|创新|CDMN|RDE"
    owner_agent: snowdrop
    executor_tool: null
    priority: 115
    mode: intense
    notes: "Phase-B should dispatch codex_cli + gemini_cli in parallel."

  - id: opensource-search
    pattern: "github|repo|benchmark|reproduce|复现|开源对比|检索"
    owner_agent: methode
    executor_tool: codex_cli
    priority: 105
    mode: daily

  - id: blog-research-breakdown
    pattern: "blog.*research|research.*blog|拆解.*md|md.*拆解|报告.*拆解|维护.*blog"
    owner_agent: methode
    executor_tool: codex_cli
    priority: 102
    mode: daily

  - id: architecture
    pattern: "architecture|system design|架构|重构.*核心|redesign|refactor.*core"
    owner_agent: lacia
    executor_tool: claude_architect_opus_cli
    priority: 100
    mode: daily

  - id: academic-proof
    pattern: "theorem|proof|数学|物理|学术|paper|第一性原理|soul|证明|连续性|lipschitz"
    owner_agent: snowdrop
    executor_tool: gemini_cli
    priority: 95
    mode: daily

  - id: complex-coding
    pattern: "implement.*complex|debug.*hard|疑难|大规模重构|hotfix|critical.*bug|core.*logic"
    owner_agent: methode
    executor_tool: codex_cli
    priority: 90
    mode: daily

  - id: daily-dev
    pattern: "frontend|backend|api|页面|前端|后端|组件|feature|bugfix|refactor|blog|ui|ux"
    owner_agent: methode
    executor_tool: claude_generalist_cli
    priority: 80
    mode: daily

  - id: structured-build
    pattern: "build.*plan|模块拆分|工程拆分|构建计划"
    owner_agent: methode
    executor_tool: claude_architect_sonnet_cli
    priority: 70
    mode: daily

  - id: default
    pattern: ".*"
    owner_agent: methode
    executor_tool: null
    priority: 10
    mode: daily
