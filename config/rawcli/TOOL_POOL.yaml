# TOOL_POOL.yaml — Raw CLI 工具池（单一真相来源）
# 位置: ~/.openclaw/beatless/TOOL_POOL.yaml
# 替代: acpx-config.json + MODEL_ROUTING.yaml 中的工具定义

version: 1

tools:
  codex_cli:
    command: "codex"
    args: ["exec", "-m", "gpt-5.3-codex", "--skip-git-repo-check"]
    prompt_mode: "positional"
    native_model: "gpt-5.3-codex"
    provider: "openai"
    timeout_seconds: 1800
    use_case: "开源检索/复杂代码/疑难debug/大规模重构"
    notes: "搜索优先默认工具"

  claude_generalist_cli:
    command: "claude"
    args: ["--permission-mode", "bypassPermissions"]
    prompt_mode: "dash_p"
    native_model: "inherit_default_via_claude_config"
    provider: "anthropic"
    timeout_seconds: 1800
    use_case: "日常开发/前后端/API/bugfix（可在 Claude 配置中切换默认模型，如 Kimi For Coding）"
    notes: "默认不写死 --model，继承 ClaudeCode 当前默认模型"

  claude_architect_opus_cli:
    command: "claude"
    args: ["--model", "claude-opus-4-6", "--permission-mode", "bypassPermissions"]
    prompt_mode: "dash_p"
    native_model: "claude-opus-4-6"
    provider: "anthropic"
    timeout_seconds: 1800
    use_case: "架构边界/系统重构/高复杂设计"
    notes: "Architect 设计主通道（Opus 4.6）"

  claude_architect_sonnet_cli:
    command: "claude"
    args: ["--model", "claude-sonnet-4-6", "--permission-mode", "bypassPermissions"]
    prompt_mode: "dash_p"
    native_model: "claude-sonnet-4-6"
    provider: "anthropic"
    timeout_seconds: 1800
    use_case: "架构草图/结构化设计思路/中等复杂度架构任务"
    notes: "Architect 轻量设计通道（Sonnet 4.6）"

  # Legacy aliases kept for backward compatibility with old routes/tasks.
  claude_opus_cli:
    command: "claude"
    args: ["--model", "claude-opus-4-6", "--permission-mode", "bypassPermissions"]
    prompt_mode: "dash_p"
    native_model: "claude-opus-4-6"
    provider: "anthropic"
    timeout_seconds: 1800
    use_case: "兼容旧任务: 架构边界/回滚策略/系统重构"
    notes: "兼容别名，建议新任务用 claude_architect_opus_cli"

  # Legacy alias kept for backward compatibility with old routes/tasks.
  claude_sonnet_cli:
    command: "claude"
    args: ["--model", "claude-sonnet-4-6", "--permission-mode", "bypassPermissions"]
    prompt_mode: "dash_p"
    native_model: "claude-sonnet-4-6"
    provider: "anthropic"
    timeout_seconds: 1800
    use_case: "兼容旧任务: 日常开发/结构化构建"
    notes: "兼容别名，建议新任务用 claude_generalist_cli 或 claude_architect_sonnet_cli"

  gemini_cli:
    command: "gemini"
    args: ["--yolo", "--model", "gemini-3.1-pro-preview"]
    prompt_mode: "dash_p"
    requires_tty: false
    native_model: "gemini-3.1-pro-preview"
    provider: "google"
    timeout_seconds: 900
    use_case: "学术推理/定理证明/数学物理/第一性发散"
    notes: "非搜索首选——codex_cli 先行"

# 路由映射: owner_agent → executor_tool
routing_defaults:
  search_first: codex_cli
  daily_dev: claude_generalist_cli
  academic: gemini_cli
  architecture: claude_architect_opus_cli
  emergency_code: codex_cli
  opus_timeout_fallback: claude_architect_sonnet_cli
