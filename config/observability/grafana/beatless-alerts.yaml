apiVersion: 1
groups:
  - orgId: 1
    name: beatless-rawcli
    folder: Beatless
    interval: 60s
    rules:
      - uid: beatless-fail-rate-critical
        title: "Fail Rate Critical (>30%)"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: rawcli_window_fail_rate
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [0.30]
        for: 2m
        labels:
          severity: critical
          team: beatless

      - uid: beatless-fail-rate-warn
        title: "Fail Rate Warning (>15%)"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: rawcli_window_fail_rate
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [0.15]
        for: 5m
        labels:
          severity: warning

      - uid: beatless-ack-latency
        title: "ACK Latency P95 > 2000ms"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: rawcli_ack_latency_ms_p95
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [2000]
        for: 3m
        labels:
          severity: warning

      - uid: beatless-convergence-low
        title: "Convergence Ratio Below Threshold"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: rawcli_entropy_convergence_ratio
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: lt
                    params: [0.3]
        for: 10m
        labels:
          severity: warning

      - uid: beatless-opus-budget
        title: "Opus Daily Budget Exhausted"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: rawcli_anthropic_calls_today{model="opus"}
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [3]
        for: 0s
        labels:
          severity: warning
